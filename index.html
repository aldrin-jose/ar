<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  embedded
  color-space="sRGB"
  renderer="colorManagement:true; physicallyCorrectLights:true; antialias:true"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="icecubeModel" src="./icecube.glb"></a-asset-item>
  </a-assets>

  <!-- Lights -->
  <a-light type="ambient" intensity="2"></a-light>
  <a-light type="directional" intensity="3" position="1 2 1"></a-light>
  <a-light type="directional" intensity="2" position="-1 1 1"></a-light>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <!-- Image Target -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model
      src="#icecubeModel"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.1 0.1 0.1"
      animation-mixer>
    </a-gltf-model>

  </a-entity>

</a-scene>

</body>
</html>
