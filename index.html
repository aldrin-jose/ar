<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- A-Frame and MindAR Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <!-- Extras for playing GLTF Animations -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <!-- Point imageTargetSrc to your compiled cup image file -->
    <a-scene mindar-image="imageTargetSrc: ./cup-target.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <!-- Load your Blender GLB file -->
        <a-asset-item id="animatedModel" src="./your-blender-model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Target Index 0 corresponds to your cup graphic -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Add your GLTF model and set animation-mixer to play the clip -->
        <a-gltf-model src="#animatedModel" position="0 0 0" scale="0.5 0.5 0.5" rotation="0 0 0" animation-mixer></a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
